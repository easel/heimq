# kafka-consumer-perf-test smoke profile
# Consume all records from the bench-smoke topic at max throughput.
#
# Usage:
#   kafka-consumer-perf-test --consumer.config scripts/bench/profiles/consumer-smoke.properties \
#     --topic bench-smoke --messages 10000 --bootstrap-server localhost:9094 \
#     --group bench-consumer-smoke

bootstrap.servers=localhost:9094
auto.offset.reset=earliest
enable.auto.commit=false
