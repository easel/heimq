name: release-binaries

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build-linux-x86_64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build -p heimq --release

      - name: Package binary
        run: |
          mkdir -p dist
          cp target/release/heimq dist/heimq-linux-x86_64
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum dist/heimq-linux-x86_64 > dist/heimq-linux-x86_64.sha256
          else
            shasum -a 256 dist/heimq-linux-x86_64 > dist/heimq-linux-x86_64.sha256
          fi

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: heimq-linux-x86_64
          path: |
            dist/heimq-linux-x86_64
            dist/heimq-linux-x86_64.sha256
          if-no-files-found: error
