[[exemption]]
id      = "cluster-id-nondeterministic"
field   = "cluster_id"
scope   = "all"
oracle  = "all"
reason  = "heimq generates a fresh cluster_id on each start; clients do not use this for routing"
prd_ref = "PRD non-goal #1 (no persistence of broker identity across restart)"
status  = "active"

[[exemption]]
id      = "txn-state-loss-on-restart"
field   = "txn_outcome.records_visible"
scope   = "workloads/transactions"
oracle  = "all"
reason  = "In-memory transactional state is not persisted; PRD explicitly allows loss on restart"
prd_ref = "PRD non-goal #1"
status  = "future"

[[exemption]]
id      = "txn-produce-offset-epoch-fence"
field   = "record.offset"
scope   = "transactional_produce_roundtrip"
oracle  = "redpanda"
reason  = "Redpanda writes an internal epoch-fence record at offset 0 before user data, shifting all committed record offsets by +1. heimq does not write this internal record (matching Apache Kafka, which writes its commit marker after user data, not before). Key/value content is identical. Redpanda-only — heimq is expected to match Kafka's offsets here."
prd_ref = "PRD non-goal #1 (internal broker implementation details)"
status  = "active"
