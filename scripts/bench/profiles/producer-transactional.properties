# kafka-producer-perf-test transactional profile
# Transactional producer: 10k records in 1000-record transactions.
# Validates that heimq EOS (InitProducerId, AddPartitionsToTxn, EndTxn) works
# end-to-end with the standard Kafka perf tool.
#
# Usage:
#   kafka-producer-perf-test --producer.config scripts/bench/profiles/producer-transactional.properties \
#     --topic bench-transactional --num-records 10000 --record-size 128 --throughput -1 \
#     --transaction-duration-ms 1000 \
#     --producer-props bootstrap.servers=localhost:9094

bootstrap.servers=localhost:9094
acks=all
enable.idempotence=true
transactional.id=bench-txn-perf
transaction.timeout.ms=60000
max.in.flight.requests.per.connection=5
retries=2147483647
