name: test

# Hard CI gate per ADR-002 (Layer 2 — required CI status check):
# runs formatting, clippy, and the full workspace test suite on every
# push and pull request. Marked required in branch protection on main.
# The stress-matrix job remains continue-on-error and is not a gate.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install librdkafka build dependencies
        # rdkafka (dev-dependency) vendors librdkafka via cmake-build,
        # which needs the libcurl/libsasl dev headers on the runner.
        run: sudo apt-get update && sudo apt-get install -y libcurl4-openssl-dev libsasl2-dev

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Run workspace tests
        run: cargo test --workspace --all-targets
