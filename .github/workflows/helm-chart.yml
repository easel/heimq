name: helm-chart

on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  CHART_DIR: charts/heimq
  OCI_REGISTRY: oci://ghcr.io/${{ github.repository_owner }}/charts

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Lint chart
        run: helm lint "${CHART_DIR}"

      - name: Template chart
        run: helm template heimq "${CHART_DIR}"

  publish:
    needs: validate
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Package and push chart
        run: |
          chart_version="${GITHUB_REF_NAME#v}"
          mkdir -p dist
          helm package "${CHART_DIR}" \
            --destination dist \
            --version "${chart_version}" \
            --app-version "${chart_version}"
          helm push "dist/heimq-${chart_version}.tgz" "${OCI_REGISTRY}"

      - name: Publish chart path
        run: |
          chart_version="${GITHUB_REF_NAME#v}"
          {
            echo "Helm chart published to ${OCI_REGISTRY}/heimq:${chart_version}"
            echo "Install with: helm install heimq ${OCI_REGISTRY}/heimq --version ${chart_version}"
          } >> "$GITHUB_STEP_SUMMARY"
