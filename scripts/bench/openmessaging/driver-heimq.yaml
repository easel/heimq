# OpenMessaging Benchmark driver configuration for heimq.
#
# Connects the OMB Kafka driver to a local heimq instance.
# Single-partition, single-replica (heimq is a single-node broker).
#
# Usage with run-omb.sh:
#   BOOTSTRAP=localhost:9094 ./scripts/bench/run-omb.sh

name: heimq
driverClass: io.openmessaging.benchmark.driver.kafka.KafkaBenchmarkDriver

replicationFactor: 1

topicConfig: ""

commonConfig: |
  bootstrap.servers=localhost:9094
  default.api.timeout.ms=60000
  request.timeout.ms=60000

producerConfig: |
  acks=1
  linger.ms=1
  batch.size=65536

consumerConfig: |
  auto.offset.reset=earliest
  enable.auto.commit=false
  max.partition.fetch.bytes=1048576
