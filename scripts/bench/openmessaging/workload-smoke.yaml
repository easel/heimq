# OpenMessaging Benchmark conformance workload for heimq.
#
# Minimal workload: 1 topic, 1 partition, 1KB messages, 1 min duration.
# This is a conformance test, not a performance target.

name: heimq-smoke

topics: 1
partitionsPerTopic: 1
messageSize: 1024
keyDistributor: "NO_KEY"
subscriptionsPerTopic: 1
consumerPerSubscription: 1
producersPerTopic: 1
producerRate: 1000
consumerBacklogSizeGB: 0
testDurationMinutes: 1
warmupDurationMinutes: 0
