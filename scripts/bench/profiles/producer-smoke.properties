# kafka-producer-perf-test smoke profile
# Non-idempotent producer: 10k records, 128-byte payloads, throughput-unlimited.
#
# Usage:
#   kafka-producer-perf-test --producer.config scripts/bench/profiles/producer-smoke.properties \
#     --topic bench-smoke --num-records 10000 --record-size 128 --throughput -1 \
#     --producer-props bootstrap.servers=localhost:9094

bootstrap.servers=localhost:9094
acks=1
enable.idempotence=false
retries=0
