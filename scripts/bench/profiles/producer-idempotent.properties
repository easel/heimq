# kafka-producer-perf-test idempotent profile
# Idempotent producer (enable.idempotence=true): 10k records, 128-byte payloads.
# Validates that heimq correctly handles InitProducerId + sequence validation.
#
# Usage:
#   kafka-producer-perf-test --producer.config scripts/bench/profiles/producer-idempotent.properties \
#     --topic bench-idempotent --num-records 10000 --record-size 128 --throughput -1 \
#     --producer-props bootstrap.servers=localhost:9094

bootstrap.servers=localhost:9094
acks=all
enable.idempotence=true
max.in.flight.requests.per.connection=5
retries=2147483647
