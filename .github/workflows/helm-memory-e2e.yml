name: helm-memory-e2e

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  helm-memory-e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install native test dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            libcurl4-openssl-dev \
            libsasl2-dev \
            pkg-config

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Install kind
        run: |
          curl -Lo kind https://kind.sigs.k8s.io/dl/v0.30.0/kind-linux-amd64
          chmod +x kind
          sudo mv kind /usr/local/bin/kind
          kind version

      - name: Run Helm fixed-memory e2e
        run: scripts/helm-memory-e2e.sh

      - name: Upload Helm memory e2e artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: helm-memory-e2e-${{ github.run_id }}
          path: target/helm-memory-e2e/
          if-no-files-found: warn
