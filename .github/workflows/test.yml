name: test

# Hard CI gate per ADR-002 (Layer 2 — required CI status check):
# runs formatting, clippy, and the full workspace test suite on every
# push and pull request. Marked required in branch protection on main.
# The stress-matrix job remains continue-on-error and is not a gate.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  # Supply-chain gate: advisories, licenses, banned crates, and source origins.
  # Policy lives in deny.toml, kept aligned with the downstream fjord/niflheim
  # workspaces. Needs no system deps, so it runs independently of `test`.
  deny:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          rust-version: "1.88.0"
          arguments: --all-features
          command-arguments: --hide-inclusion-graph

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.88.0
        with:
          components: clippy, rustfmt

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Run workspace tests
        run: cargo test --workspace --all-targets

      - name: Install cargo-machete
        run: cargo install cargo-machete --locked --version 0.9.1

      - name: Check unused dependencies
        run: cargo machete
