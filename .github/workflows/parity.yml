name: parity

# Differential parity tests: runs heimq + Redpanda in Docker and compares
# wire-level responses across all SD-003 workloads.
# Not a required gate (CI can be slow / Docker unavailable on some runners),
# but must be green before any IP-001 Slice milestone is closed.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  parity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install librdkafka build dependencies
        run: sudo apt-get update && sudo apt-get install -y libcurl4-openssl-dev libsasl2-dev

      - name: Pull Redpanda image (cache-warm)
        run: docker pull docker.redpanda.com/redpandadata/redpanda:v25.1.1

      - name: Run parity tests
        run: cargo test -p heimq --test parity -- --test-threads=1
        env:
          PARITY_TESTS: "1"
